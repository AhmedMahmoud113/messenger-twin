name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate native project
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Force Swift 5 for all Pods targets
        run: |
          cd ios
          echo "=== Forcing SWIFT_VERSION = 5 in Pods.xcodeproj ==="
          # The ExpoModulesCore pod sets SWIFT_VERSION = 6 which causes
          # strict concurrency errors. Override ALL Swift 6 references to Swift 5.
          PBXPROJ="Pods/Pods.xcodeproj/project.pbxproj"
          if [ -f "$PBXPROJ" ]; then
            # Count current Swift 6 settings
            echo "Swift version settings before:"
            grep -c "SWIFT_VERSION = 6" "$PBXPROJ" || echo "0 instances of SWIFT_VERSION = 6"
            grep -c "SWIFT_VERSION = 5" "$PBXPROJ" || echo "0 instances of SWIFT_VERSION = 5"
            # Replace any Swift 6.x version with Swift 5
            sed -i '' 's/SWIFT_VERSION = 6[^;]*/SWIFT_VERSION = 5/g' "$PBXPROJ"
            echo "Swift version settings after:"
            grep "SWIFT_VERSION = 6" "$PBXPROJ" | head -3 || echo "0 instances of SWIFT_VERSION = 6"
            grep -c "SWIFT_VERSION = 5" "$PBXPROJ" || echo "0 instances of SWIFT_VERSION = 5"
          else
            echo "WARNING: $PBXPROJ not found!"
            find Pods -name "project.pbxproj" | head -5
          fi
          echo "=== Done ==="

      - name: Patch expo-modules-core Swift 6 syntax
        run: |
          # Fix 2 files that use @MainActor on protocol conformances (Swift 6-only syntax)
          FILE1="node_modules/expo-modules-core/ios/Core/Views/SwiftUI/SwiftUIHostingView.swift"
          if [ -f "$FILE1" ]; then
            sed -i '' 's/@MainActor AnyExpoSwiftUIHostingView/AnyExpoSwiftUIHostingView/g' "$FILE1"
            echo "Patched: $FILE1"
          fi
          FILE2="node_modules/expo-modules-core/ios/Core/Views/ViewDefinition.swift"
          if [ -f "$FILE2" ]; then
            sed -i '' 's/: @MainActor AnyArgument/: AnyArgument/g' "$FILE2"
            echo "Patched: $FILE2"
          fi

      - name: Find workspace and scheme
        id: find-xcode
        run: |
          set -e
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          if [ -z "$WORKSPACE" ]; then
            echo "No .xcworkspace found in ios/"
            ls -la ios/
            exit 1
          fi
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "Found workspace: $WORKSPACE"
          echo "Using scheme: $SCHEME"

      - name: Build .app (unsigned)
        run: |
          set -e
          set -o pipefail
          xcodebuild \
            -workspace "${{ steps.find-xcode.outputs.workspace }}" \
            -scheme "${{ steps.find-xcode.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            2>&1 | tee build.log | tail -50
          echo ""
          echo "xcodebuild finished successfully"

      - name: Package IPA
        run: |
          set -e
          APP_PATH=$(find ios/build/Build/Products -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found in build output"
            find ios/build/Build/Products -type d 2>/dev/null || echo "No Products directory found"
            tail -100 build.log 2>/dev/null || true
            exit 1
          fi
          echo "Found app: $APP_PATH"
          APP_SIZE=$(du -sh "$APP_PATH" | cut -f1)
          echo "App size: $APP_SIZE"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r MessengerTwin.ipa Payload
          IPA_SIZE=$(du -sh MessengerTwin.ipa | cut -f1)
          echo "IPA size: $IPA_SIZE"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MessengerTwin-IPA
          path: MessengerTwin.ipa
          retention-days: 90

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
