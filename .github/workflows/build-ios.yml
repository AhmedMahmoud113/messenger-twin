name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate native project
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Fix Swift 6 strict concurrency in Pods
        run: |
          cd ios
          echo "=== Patching xcconfig files to disable strict concurrency ==="
          find Pods/Target\ Support\ Files -name "*.xcconfig" -exec grep -l "SWIFT" {} \; | head -20 || true
          # Add SWIFT_STRICT_CONCURRENCY=minimal to ALL pod xcconfig files
          find Pods/Target\ Support\ Files -name "*.xcconfig" | while read f; do
            if ! grep -q "SWIFT_STRICT_CONCURRENCY" "$f"; then
              echo "SWIFT_STRICT_CONCURRENCY = minimal" >> "$f"
            fi
          done
          echo "Patched xcconfig files"
          # Also patch all pbxproj files in Pods to add the setting
          find Pods -name "project.pbxproj" | while read f; do
            sed -i '' 's/SWIFT_OPTIMIZATION_LEVEL/SWIFT_STRICT_CONCURRENCY = minimal; SWIFT_OPTIMIZATION_LEVEL/g' "$f"
            echo "Patched: $f"
          done
          echo "=== Done ==="

      - name: Find workspace and scheme
        id: find-xcode
        run: |
          set -e
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          if [ -z "$WORKSPACE" ]; then
            echo "No .xcworkspace found in ios/"
            ls -la ios/
            exit 1
          fi
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "Found workspace: $WORKSPACE"
          echo "Using scheme: $SCHEME"

      - name: Build .app (unsigned)
        run: |
          set -e
          set -o pipefail
          xcodebuild \
            -workspace "${{ steps.find-xcode.outputs.workspace }}" \
            -scheme "${{ steps.find-xcode.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            SWIFT_STRICT_CONCURRENCY=minimal \
            2>&1 | tee build.log | tail -50
          echo ""
          echo "xcodebuild finished successfully"

      - name: Package IPA
        run: |
          set -e
          APP_PATH=$(find ios/build/Build/Products -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found in build output"
            find ios/build/Build/Products -type d 2>/dev/null || echo "No Products directory found"
            tail -100 build.log 2>/dev/null || true
            exit 1
          fi
          echo "Found app: $APP_PATH"
          APP_SIZE=$(du -sh "$APP_PATH" | cut -f1)
          echo "App size: $APP_SIZE"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r MessengerTwin.ipa Payload
          IPA_SIZE=$(du -sh MessengerTwin.ipa | cut -f1)
          echo "IPA size: $IPA_SIZE"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MessengerTwin-IPA
          path: MessengerTwin.ipa
          retention-days: 90

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
