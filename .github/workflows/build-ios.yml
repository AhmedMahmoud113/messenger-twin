name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate native project
        run: npx expo prebuild --platform ios --clean

      - name: Patch Podfile for Swift concurrency
        run: |
          cd ios
          # Inject SWIFT_STRICT_CONCURRENCY=minimal into Podfile AFTER react_native_post_install
          # Using sed to add settings before the closing "end" of post_install block
          PATCH='    installer.pods_project.targets.each do |target|\n      target.build_configurations.each do |config|\n        config.build_settings['"'"'SWIFT_STRICT_CONCURRENCY'"'"'] = '"'"'minimal'"'"'\n        config.build_settings['"'"'CODE_SIGNING_ALLOWED'"'"'] = '"'"'NO'"'"'\n        config.build_settings['"'"'CODE_SIGNING_REQUIRED'"'"'] = '"'"'NO'"'"'\n        config.build_settings['"'"'CODE_SIGN_IDENTITY'"'"'] = '"'"''"'"'\n      end\n    end'
          # Find the line number of the last "end" before the final "end" in post_install
          # Strategy: find react_native_post_install closing paren, add after it
          LINE=$(grep -n "react_native_post_install" Podfile | tail -1 | cut -d: -f1)
          if [ -n "$LINE" ]; then
            # Find the closing paren ")" after react_native_post_install
            CLOSE_LINE=$(tail -n +"$LINE" Podfile | grep -n ")" | head -1 | cut -d: -f1)
            INSERT_AT=$((LINE + CLOSE_LINE))
            sed -i '' "${INSERT_AT}a\\
            # --- Fix Swift 6 strict concurrency ---\\
            installer.pods_project.targets.each do |target|\\
              target.build_configurations.each do |config|\\
                config.build_settings['SWIFT_STRICT_CONCURRENCY'] = 'minimal'\\
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'\\
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'\\
                config.build_settings['CODE_SIGN_IDENTITY'] = ''\\
              end\\
            end\\
            # --- End fix ---
          " Podfile
            echo "Injected after react_native_post_install at line $INSERT_AT"
          else
            echo "react_native_post_install not found, appending post_install block"
            printf '\npost_install do |installer|\n  installer.pods_project.targets.each do |target|\n    target.build_configurations.each do |config|\n      config.build_settings["SWIFT_STRICT_CONCURRENCY"] = "minimal"\n      config.build_settings["CODE_SIGNING_ALLOWED"] = "NO"\n    end\n  end\nend\n' >> Podfile
          fi
          echo "--- Patched Podfile (last 25 lines) ---"
          tail -25 Podfile

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Find workspace and scheme
        id: find-xcode
        run: |
          set -e
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          if [ -z "$WORKSPACE" ]; then
            echo "No .xcworkspace found in ios/"
            ls -la ios/
            exit 1
          fi
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "Found workspace: $WORKSPACE"
          echo "Using scheme: $SCHEME"

      - name: Build .app (unsigned)
        run: |
          set -e
          set -o pipefail
          xcodebuild \
            -workspace "${{ steps.find-xcode.outputs.workspace }}" \
            -scheme "${{ steps.find-xcode.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            SWIFT_STRICT_CONCURRENCY=minimal \
            2>&1 | tee build.log | tail -50
          echo ""
          echo "xcodebuild finished successfully"

      - name: Package IPA
        run: |
          set -e
          APP_PATH=$(find ios/build/Build/Products -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found in build output"
            find ios/build/Build/Products -type d 2>/dev/null || echo "No Products directory found"
            tail -100 build.log 2>/dev/null || true
            exit 1
          fi
          echo "Found app: $APP_PATH"
          APP_SIZE=$(du -sh "$APP_PATH" | cut -f1)
          echo "App size: $APP_SIZE"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r MessengerTwin.ipa Payload
          IPA_SIZE=$(du -sh MessengerTwin.ipa | cut -f1)
          echo "IPA size: $IPA_SIZE"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MessengerTwin-IPA
          path: MessengerTwin.ipa
          retention-days: 90

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
