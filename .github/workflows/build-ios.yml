name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Select Xcode 15
        run: |
          # List available Xcode versions
          ls /Applications/ | grep Xcode || true
          # Use Xcode 15.x to avoid Swift 6 strict concurrency issues
          XCODE_PATH=$(ls -d /Applications/Xcode_15*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "Xcode 15 not found, using default Xcode"
            xcodebuild -version
          else
            sudo xcode-select -s "$XCODE_PATH"
            echo "Selected: $XCODE_PATH"
            xcodebuild -version
          fi

      - name: Install dependencies
        run: npm ci

      - name: Generate native project
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Find workspace and scheme
        id: find-xcode
        run: |
          set -e
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          if [ -z "$WORKSPACE" ]; then
            echo "No .xcworkspace found in ios/"
            ls -la ios/
            exit 1
          fi
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT

          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT

          echo "Found workspace: $WORKSPACE"
          echo "Using scheme: $SCHEME"

      - name: Build .app (unsigned)
        run: |
          set -e
          set -o pipefail

          xcodebuild \
            -workspace "${{ steps.find-xcode.outputs.workspace }}" \
            -scheme "${{ steps.find-xcode.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            SWIFT_STRICT_CONCURRENCY=minimal \
            2>&1 | tee build.log | tail -50

          echo ""
          echo "xcodebuild finished successfully"

      - name: Package IPA
        run: |
          set -e

          APP_PATH=$(find ios/build/Build/Products -name "*.app" -type d | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "No .app found in build output"
            find ios/build/Build/Products -type d 2>/dev/null || echo "No Products directory found"
            echo ""
            echo "Last 100 lines of build log:"
            tail -100 build.log 2>/dev/null || true
            exit 1
          fi

          echo "Found app: $APP_PATH"
          APP_SIZE=$(du -sh "$APP_PATH" | cut -f1)
          echo "App size: $APP_SIZE"

          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r MessengerTwin.ipa Payload

          IPA_SIZE=$(du -sh MessengerTwin.ipa | cut -f1)
          echo "IPA size: $IPA_SIZE"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MessengerTwin-IPA
          path: MessengerTwin.ipa
          retention-days: 90

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
